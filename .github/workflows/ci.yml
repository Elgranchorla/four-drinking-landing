name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  landing:
    name: Landing Web CI
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Validate Firebase config files
        run: |
          test -f firebase.json
          test -f .firebaserc
          grep -q '"site": "four-drinking-landing"' firebase.json

      - name: Upload web build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: landing-web-build
          path: build/web
          retention-days: 7

  deploy:
    name: Deploy Landing to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [landing]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    timeout-minutes: 30
    concurrency:
      group: landing-deploy-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: landing-web-build
          path: build/web

      - name: Authenticate to Google Cloud (service account)
        id: gcp_auth
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRINKINGAPP }}
          project_id: drinkingapp-84ac5

      - name: Set up Cloud SDK
        if: steps.gcp_auth.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          USE_SERVICE_ACCOUNT: ${{ steps.gcp_auth.outcome == 'success' }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          PROJECT_ID="${FIREBASE_PROJECT_ID:-drinkingapp-84ac5}"
          HOSTING_SITE="four-drinking-landing"
          export GOOGLE_CLOUD_QUOTA_PROJECT="$PROJECT_ID"

          if ! grep -q "\"site\": \"${HOSTING_SITE}\"" firebase.json; then
            echo "::error::firebase.json must target hosting site ${HOSTING_SITE}."
            exit 1
          fi

          echo "Deploying landing to hosting site: ${HOSTING_SITE}"

          if [ "$USE_SERVICE_ACCOUNT" = "true" ]; then
            echo "Deploying with service account credentials..."
            firebase deploy \
              --only "hosting:${HOSTING_SITE}" \
              --project "$PROJECT_ID" \
              --non-interactive
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Deploying with FIREBASE_TOKEN..."
            firebase deploy \
              --only "hosting:${HOSTING_SITE}" \
              --project "$PROJECT_ID" \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
          else
            echo "::error::Missing deploy credentials. Configure FIREBASE_SERVICE_ACCOUNT_DRINKINGAPP (recommended) or FIREBASE_TOKEN in repository secrets."
            exit 1
          fi
