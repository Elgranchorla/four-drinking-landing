name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  landing:
    name: Landing Web CI
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Validate Firebase config files
        run: |
          test -f firebase.json
          test -f .firebaserc
          grep -q '"site": "four-drinking-landing"' firebase.json

      - name: Upload web build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: landing-web-build
          path: build/web
          retention-days: 7

  deploy:
    name: Deploy Landing to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [landing]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    timeout-minutes: 30
    concurrency:
      group: landing-deploy-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: landing-web-build
          path: build/web

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRINKINGAPP }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          PROJECT_ID="drinkingapp-84ac5"
          HOSTING_SITE="four-drinking-landing"
          export GOOGLE_CLOUD_QUOTA_PROJECT="$PROJECT_ID"

          if ! grep -q "\"site\": \"${HOSTING_SITE}\"" firebase.json; then
            echo "::error::firebase.json must target hosting site ${HOSTING_SITE}."
            exit 1
          fi

          echo "Deploying landing to project ${PROJECT_ID}, hosting site ${HOSTING_SITE}"

          deploy_with_service_account() {
            CREDENTIALS_FILE="${RUNNER_TEMP}/gcp.json"
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$CREDENTIALS_FILE"
            export GOOGLE_APPLICATION_CREDENTIALS="$CREDENTIALS_FILE"

            python3 - <<'PY'
          import json
          import os
          import sys

          path = os.environ["GOOGLE_APPLICATION_CREDENTIALS"]
          with open(path, encoding="utf-8") as handle:
              data = json.load(handle)

          project_id = data.get("project_id")
          client_email = data.get("client_email")
          if not project_id or not client_email:
              print("::error::Service account JSON is missing project_id or client_email.")
              sys.exit(1)

          print(f"Service account project: {project_id}")
          print(f"Service account email: {client_email}")
          PY

            echo "Verifying Firebase project access..."
            firebase projects:list --project "$PROJECT_ID" --non-interactive >/dev/null

            echo "Deploying with service account credentials..."
            firebase deploy \
              --only "hosting:${HOSTING_SITE}" \
              --project "$PROJECT_ID" \
              --non-interactive
          }

          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            deploy_with_service_account
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Deploying with FIREBASE_TOKEN..."
            firebase deploy \
              --only "hosting:${HOSTING_SITE}" \
              --project "$PROJECT_ID" \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
          else
            echo "::error::Missing deploy credentials. Add FIREBASE_SERVICE_ACCOUNT_DRINKINGAPP to this repository (same JSON secret used in four_drinking_admin), or configure FIREBASE_TOKEN."
            exit 1
          fi
