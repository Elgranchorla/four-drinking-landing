name: Deploy Landing Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: landing-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy_landing:
    name: Deploy Landing Web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRINKINGAPP }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          npm install -g firebase-tools
          PROJECT_ID="${FIREBASE_PROJECT_ID:-drinkingapp-84ac5}"

          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > "${RUNNER_TEMP}/gcp.json"
            export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/gcp.json"
            firebase deploy --only hosting --project "$PROJECT_ID"
          elif [ -n "$FIREBASE_TOKEN" ]; then
            firebase deploy --only hosting --project "$PROJECT_ID" --token "$FIREBASE_TOKEN"
          else
            echo "::error::Missing deploy credentials. Configure FIREBASE_SERVICE_ACCOUNT_DRINKINGAPP (recommended) or FIREBASE_TOKEN in repository secrets."
            exit 1
          fi
