name: four_drinking_landing
description: Public landing page for 4drinking (Flutter Web + Firebase Hosting).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  cloud_firestore: ^6.5.0
  flutter_svg: ^2.2.0
  flutter_markdown: ^0.7.7+1
  go_router: ^17.0.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/screenshots/
    - assets/legal/
